# CirrusSearch integration-test corpus, migrated from the per-tag BeforeOnce
# blocks in tests/integration/features/support/hooks.js.
#
# Loaded by the ImportTestCorpus maintenance script (see README.md). Each group
# records the scenario tag(s) it was set up for. `textFile`/`file` paths are
# resolved relative to this file's directory (../articles/) unless --file-root
# is given.
#
# NOT migrated from hooks.js (out of scope for a static corpus):
#  - null edits, sleeps, and the cirrus-suggest-index build — runtime-only steps.
# Deviations: @prefer_recent uses static text (Date.now() can't be captured in a
# static corpus; it is a smoke test); File:DuplicatedLocally.svg is two entries
# because its description differs between commons and the local wiki.

